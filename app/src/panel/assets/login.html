<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>LNH Nordic Login</title>
	<meta
		name="description"
		content="Dedicated local login page for the LNH Nordic mission console.">
	<link rel="stylesheet" href="/panel.css">
	<script defer src="/main.js"></script>
</head>
<body data-panel-page="login" class="min-h-screen bg-gray-900 text-white antialiased">
	<main id="login-view" class="flex min-h-screen flex-1 flex-col justify-center px-6 py-12 lg:px-8">
		<div class="sm:mx-auto sm:w-full sm:max-w-sm">
			<h1 class="text-center font-serif text-3xl font-semibold tracking-tight text-white">Sign in</h1>
		</div>

		<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
			<section id="panel-alert" class="mb-6 rounded-md border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-300">
				Checking session...
			</section>

			<form id="login-form" class="space-y-6">
				<div>
					<label for="login-username" class="block text-sm/6 font-medium text-gray-100">Username</label>
					<div class="mt-2">
						<input id="login-username" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" name="username" autocomplete="username" required>
					</div>
				</div>

				<div>
					<label for="login-password" class="block text-sm/6 font-medium text-gray-100">Password</label>
					<div class="mt-2">
						<input id="login-password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" name="password" type="password" autocomplete="current-password" required>
					</div>
				</div>

				<div>
					<button id="login-submit" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs transition hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:cursor-wait disabled:opacity-60" type="submit">Sign in</button>
				</div>
			</form>
		</div>

	</main>
</body>
</html>
